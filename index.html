<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Linked List</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c2030;
  --surface3: #242840;
  --accent: #f4c430;
  --accent2: #e07b39;
  --blue: #4a9eff;
  --green: #4ecf82;
  --red: #ff5f5f;
  --purple: #a78bfa;
  --text: #e8eaf2;
  --text2: #8a8fa8;
  --text3: #555a72;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --rail-h: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(74,158,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,158,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

/* HEADER */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.logo-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.logo-title {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.logo-title span { color: var(--accent); }
.stats {
  display: flex;
  gap: 20px;
}
.stat {
  text-align: right;
}
.stat-val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.stat-lbl {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0.05em;
}

/* TABS */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  width: fit-content;
}
.tab {
  padding: 8px 22px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.02em;
}
.tab:hover { color: var(--text); }
.tab.active {
  background: var(--surface3);
  color: var(--text);
  border: 1px solid var(--border2);
}
.tab.active.insert { color: var(--blue); }
.tab.active.delete { color: var(--red); }
.tab.active.search { color: var(--green); }

/* CONTROL PANEL */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 20px;
}
.panel-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.controls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.controls-row + .controls-row {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

input[type=text], select {
  height: 38px;
  padding: 0 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
  min-width: 0;
}
input[type=text] { width: 140px; }
select { cursor: pointer; }
input[type=text]:focus, select:focus {
  border-color: var(--blue);
}
input[type=text]::placeholder { color: var(--text3); }

.btn {
  height: 38px;
  padding: 0 18px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--surface3); border-color: rgba(255,255,255,0.2); }
.btn:active { transform: scale(0.97); }
.btn.blue { background: rgba(74,158,255,0.15); border-color: rgba(74,158,255,0.4); color: var(--blue); }
.btn.blue:hover { background: rgba(74,158,255,0.25); }
.btn.red { background: rgba(255,95,95,0.15); border-color: rgba(255,95,95,0.4); color: var(--red); }
.btn.red:hover { background: rgba(255,95,95,0.25); }
.btn.green { background: rgba(78,207,130,0.15); border-color: rgba(78,207,130,0.4); color: var(--green); }
.btn.green:hover { background: rgba(78,207,130,0.25); }
.btn.ghost { background: transparent; border-color: var(--border); color: var(--text2); }
.btn.ghost:hover { color: var(--text); border-color: var(--border2); }

/* TRAIN VIEWPORT */
.train-section {
  margin-bottom: 20px;
}
.section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.train-viewport {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 20px 14px;
  overflow-x: auto;
  position: relative;
}

.track-area {
  display: flex;
  align-items: flex-end;
  gap: 0;
  min-height: 110px;
  padding-bottom: 12px;
}

/* RAILS */
.rails-wrap {
  position: relative;
  padding: 4px 0 2px;
  overflow: hidden;
}
.rail {
  height: 5px;
  background: var(--surface3);
  border-radius: 3px;
  margin: 2px 0;
  position: relative;
  overflow: hidden;
}
.rail::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(244,196,48,0.15), transparent);
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer { to { left: 200%; } }
.sleepers {
  display: flex;
  gap: 0;
  height: 10px;
  margin: 0 -20px;
}
.sleeper {
  flex: 1;
  border-left: 3px solid var(--surface3);
}

/* CAR */
.car-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
}
.head-badge {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--purple);
  background: rgba(167,139,250,0.12);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 4px;
  padding: 2px 7px;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.spacer-badge { height: 22px; }

.car {
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  min-width: 88px;
  transition: transform .3s, opacity .3s, border-color .2s, box-shadow .2s;
}
.car.scanning { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(74,158,255,0.2); }
.car.found { border-color: var(--green); box-shadow: 0 0 0 3px rgba(78,207,130,0.25); }
.car.newly-added { animation: pop .4s cubic-bezier(.34,1.56,.64,1); }
.car.deleting { animation: vanish .35s ease forwards; }
@keyframes pop { from { transform: scale(0.5) translateY(-10px); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes vanish { to { transform: scale(0.4) translateY(-16px); opacity: 0; } }

.car-cargo {
  background: var(--surface3);
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 110px;
}
.car.found .car-cargo { background: rgba(78,207,130,0.15); color: var(--green); }
.car.scanning .car-cargo { background: rgba(74,158,255,0.15); color: var(--blue); }

.car-next {
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  text-align: center;
  background: var(--surface2);
}

/* WHEELS */
.wheels {
  display: flex;
  justify-content: space-around;
  padding: 0 8px;
  margin-top: 4px;
}
.wheel {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--surface3);
  border: 2px solid var(--text3);
  position: relative;
}
.wheel::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--text3);
  transform-origin: center;
}

/* ARROW between cars */
.car-arrow {
  display: flex;
  align-items: center;
  color: var(--text3);
  font-size: 20px;
  padding: 0 3px;
  padding-bottom: 28px;
  flex-shrink: 0;
  user-select: none;
}

/* NULL TAG */
.null-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  padding-bottom: 28px;
}
.null-tag {
  padding: 6px 12px;
  border: 1.5px dashed var(--border2);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-left: 4px;
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 80px;
  color: var(--text3);
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.05em;
}

/* MESSAGE BAR */
.msg-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
  transition: all .25s;
  min-height: 44px;
}
.msg-bar.ok { background: rgba(78,207,130,0.08); border-color: rgba(78,207,130,0.3); color: var(--green); }
.msg-bar.err { background: rgba(255,95,95,0.08); border-color: rgba(255,95,95,0.3); color: var(--red); }
.msg-bar.info { background: rgba(74,158,255,0.08); border-color: rgba(74,158,255,0.3); color: var(--blue); }
.msg-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* JAVA CODE */
.code-section {}
.code-panel {
  background: #0a0c10;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.code-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.code-dots { display: flex; gap: 6px; }
.code-dot { width: 10px; height: 10px; border-radius: 50%; }
.code-dot:nth-child(1) { background: #ff5f57; }
.code-dot:nth-child(2) { background: #febc2e; }
.code-dot:nth-child(3) { background: #28c840; }
.code-filename {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-left: 4px;
}
.code-body {
  padding: 20px 22px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.75;
  color: #abb2bf;
  white-space: pre;
  overflow-x: auto;
  min-height: 120px;
}
.kw { color: #c678dd; }
.fn { color: #61afef; }
.str { color: #98c379; }
.cmt { color: #5c6370; font-style: italic; }
.num { color: #d19a66; }

@media (max-width: 600px) {
  .app { padding: 20px 16px 40px; }
  .logo-title { font-size: 20px; }
  input[type=text] { width: 120px; }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <span class="logo-eyebrow">Java Data Structures</span>
      <span class="logo-title">Train<span>List</span></span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="sz">3</div>
        <div class="stat-lbl">CARS</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="ops">0</div>
        <div class="stat-lbl">OPS DONE</div>
      </div>
    </div>
  </header>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab active insert" onclick="setTab('insert')">Insert</button>
    <button class="tab delete" onclick="setTab('delete')">Delete</button>
    <button class="tab search" onclick="setTab('search')">Search</button>
  </div>

  <!-- INSERT PANEL -->
  <div class="panel" id="panel-insert">
    <div class="panel-title">Insert a new train car</div>
    <div class="controls-row">
      <input type="text" id="ins-val" placeholder="Cargo name..." maxlength="10"/>
      <button class="btn blue" onclick="insertAt('start')">&#43; At Start</button>
      <button class="btn blue" onclick="insertAfterDialog()">&#43; After Car</button>
      <button class="btn blue" onclick="insertAt('end')">&#43; At End</button>
      <button class="btn ghost" onclick="resetTrain()">Reset</button>
    </div>
    <div class="controls-row" id="after-row" style="display:none">
      <span style="font-size:13px;color:var(--text2)">Insert after:</span>
      <select id="after-sel"></select>
      <button class="btn green" onclick="confirmInsertAfter()">Confirm</button>
      <button class="btn ghost" onclick="cancelAfter()">Cancel</button>
    </div>
  </div>

  <!-- DELETE PANEL -->
  <div class="panel" id="panel-delete" style="display:none">
    <div class="panel-title">Remove a train car</div>
    <div class="controls-row">
      <select id="del-sel"></select>
      <button class="btn red" onclick="doDelete()">Remove Car</button>
    </div>
  </div>

  <!-- SEARCH PANEL -->
  <div class="panel" id="panel-search" style="display:none">
    <div class="panel-title">Search the train</div>
    <div class="controls-row">
      <input type="text" id="srch-val" placeholder="Cargo name..." maxlength="10"/>
      <button class="btn green" onclick="doSearch()">Search</button>
      <button class="btn ghost" onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <!-- MESSAGE BAR -->
  <div class="msg-bar" id="msg">
    <div class="msg-dot"></div>
    <span id="msg-text">Your train is ready — try inserting, deleting, or searching!</span>
  </div>

  <!-- TRAIN -->
  <div class="train-section">
    <div class="section-label">Linked list visualisation</div>
    <div class="train-viewport">
      <div class="track-area" id="track"></div>
      <div class="rails-wrap">
        <div class="rail"></div>
        <div class="sleepers" id="sleepers"></div>
        <div class="rail"></div>
      </div>
    </div>
  </div>

  <!-- CODE -->
  <div class="code-section">
    <div class="section-label">Java — what just happened</div>
    <div class="code-panel">
      <div class="code-header">
        <div class="code-dots">
          <div class="code-dot"></div>
          <div class="code-dot"></div>
          <div class="code-dot"></div>
        </div>
        <span class="code-filename">TrainCar.java</span>
      </div>
      <div class="code-body" id="java-code"><span class="cmt">// Make a move above to see the Java code here</span></div>
    </div>
  </div>

</div>

<script>
const CARGOS = ['Coal','Timber','Steel','Gold','Iron','Wheat','Oil','Cotton','Stone','Copper','Silver','Wood'];
let list = [];
let ops = 0;
let searchTimer = null;

function uid(){ return Math.random().toString(36).slice(2,8); }
function rnd(){ return CARGOS[Math.floor(Math.random()*CARGOS.length)]; }

function setTab(t){
  document.querySelectorAll('.tab').forEach(b=>{
    b.classList.toggle('active', b.textContent.toLowerCase().trim()===t);
  });
  ['insert','delete','search'].forEach(p=>{
    document.getElementById('panel-'+p).style.display = p===t?'':'none';
  });
  clearSearch();
  cancelAfter();
}

function render(opts={}){
  const track = document.getElementById('track');
  track.innerHTML='';

  if(list.length===0){
    track.innerHTML='<div class="empty-state">// empty list — head = null</div>';
    document.getElementById('sz').textContent='0';
    updateSelects(); return;
  }

  list.forEach((node,i)=>{
    const grp = document.createElement('div');
    grp.className='car-group';

    if(i===0){
      const hb=document.createElement('div');
      hb.className='head-badge'; hb.textContent='HEAD';
      grp.appendChild(hb);
    } else {
      const sp=document.createElement('div');
      sp.className='spacer-badge';
      grp.appendChild(sp);
    }

    const car=document.createElement('div');
    car.className='car';
    if(node.id===opts.highlight) car.classList.add('scanning');
    if(node.id===opts.found) car.classList.add('found');
    if(node.id===opts.deleting) car.classList.add('deleting');
    if(node.id===opts.added) car.classList.add('newly-added');

    const isLast = i===list.length-1;
    car.innerHTML=`<div class="car-cargo">${node.val}</div><div class="car-next">next ${isLast?'= null':'→'}</div>`;
    grp.appendChild(car);

    const wheels = document.createElement('div');
    wheels.className='wheels';
    wheels.innerHTML='<div class="wheel"></div><div class="wheel"></div>';
    grp.appendChild(wheels);

    track.appendChild(grp);

    if(!isLast){
      const arr=document.createElement('div');
      arr.className='car-arrow';
      arr.innerHTML='&#8594;';
      track.appendChild(arr);
    }
  });

  const nw=document.createElement('div');
  nw.className='null-wrap';
  nw.innerHTML='<div class="spacer-badge"></div><div class="null-tag">null</div>';
  track.appendChild(nw);

  document.getElementById('sz').textContent=list.length;
  updateSelects();
  buildSleepers();
}

function buildSleepers(){
  const sl=document.getElementById('sleepers');
  const w=document.querySelector('.train-viewport')?.offsetWidth||800;
  sl.innerHTML='';
  for(let i=0;i<Math.ceil(w/22);i++){
    const s=document.createElement('div');
    s.className='sleeper'; sl.appendChild(s);
  }
}

function updateSelects(){
  const opts=list.map((n,i)=>`<option value="${n.id}">${i===0?'[HEAD] ':i===list.length-1?'[TAIL] ':''}${n.val}</option>`).join('');
  document.getElementById('del-sel').innerHTML=opts||'<option disabled>No cars</option>';
  document.getElementById('after-sel').innerHTML=opts||'<option disabled>No cars</option>';
}

function msg(text,type=''){
  const bar=document.getElementById('msg');
  bar.className='msg-bar'+(type?' '+type:'');
  document.getElementById('msg-text').textContent=text;
}

function javaCode(html){
  document.getElementById('java-code').innerHTML=html;
}

const kw=s=>`<span class="kw">${s}</span>`;
const fn=s=>`<span class="fn">${s}</span>`;
const st=s=>`<span class="str">"${s}"</span>`;
const cm=s=>`<span class="cmt">${s}</span>`;

function insertAt(pos){
  const val=(document.getElementById('ins-val').value.trim()||rnd());
  document.getElementById('ins-val').value='';
  const node={id:uid(),val};
  ops++;
  document.getElementById('ops').textContent=ops;
  if(pos==='start'){
    list.unshift(node);
    render({added:node.id});
    msg(`"${val}" added at the START — it's the new head!`,'ok');
    javaCode(`${cm('// Insert at START')}\n${kw('TrainCar')} newCar = ${kw('new')} ${fn('TrainCar')}(${st(val)});\nnewCar.${fn('setNext')}(head);   ${cm('// new car points to old head')}\nhead = newCar;          ${cm('// head now points to new car')}`);
  } else {
    list.push(node);
    render({added:node.id});
    msg(`"${val}" added at the END — it's the new tail!`,'ok');
    javaCode(`${cm('// Insert at END')}\n${kw('TrainCar')} newCar = ${kw('new')} ${fn('TrainCar')}(${st(val)});\n${kw('TrainCar')} current = head;\n${kw('while')} (current.${fn('getNext')}() != ${kw('null')}) {\n    current = current.${fn('getNext')}();   ${cm('// walk to tail')}\n}\ncurrent.${fn('setNext')}(newCar);  ${cm('// tail now points to new car')}`);
  }
}

function insertAfterDialog(){
  if(list.length===0){msg('Add at least one car first!','err');return;}
  document.getElementById('after-row').style.display='flex';
}
function cancelAfter(){
  document.getElementById('after-row').style.display='none';
}
function confirmInsertAfter(){
  const selId=document.getElementById('after-sel').value;
  const idx=list.findIndex(n=>n.id===selId);
  if(idx<0){msg('Car not found','err');return;}
  const val=(document.getElementById('ins-val').value.trim()||rnd());
  document.getElementById('ins-val').value='';
  const node={id:uid(),val};
  list.splice(idx+1,0,node);
  ops++;document.getElementById('ops').textContent=ops;
  cancelAfter();
  render({added:node.id});
  const prev=list[idx].val;
  const nxt=list[idx+2]?.val||null;
  msg(`"${val}" inserted after "${prev}"!`,'ok');
  javaCode(`${cm('// Insert AFTER "'+prev+'"')}\n${kw('TrainCar')} newCar = ${kw('new')} ${fn('TrainCar')}(${st(val)});\n${kw('TrainCar')} current = head;\n${kw('while')} (!current.cargo.${fn('equals')}(${st(prev)})) {\n    current = current.${fn('getNext')}();\n}\n${cm('// re-wire the pointers')}\nnewCar.${fn('setNext')}(current.${fn('getNext')}());  ${cm('// new → '+(nxt?'"'+nxt+'"':'null'))}\ncurrent.${fn('setNext')}(newCar);       ${cm('// "'+prev+'" → new car')}`);
}

function doDelete(){
  const selId=document.getElementById('del-sel').value;
  const idx=list.findIndex(n=>n.id===selId);
  if(idx<0||list.length===0){msg('No car selected','err');return;}
  const val=list[idx].val;
  render({deleting:selId});
  setTimeout(()=>{
    list.splice(idx,1);
    ops++;document.getElementById('ops').textContent=ops;
    render();
    if(idx===0){
      msg(`"${val}" removed. Head now points to the next car.`,'ok');
      javaCode(`${cm('// Delete HEAD')}\nhead = head.${fn('getNext')}();\n${cm('// "'+val+'" is now disconnected — garbage collected')}`);
    } else {
      const prev=list[idx-1]?.val||'prev';
      const nxt=list[idx]?.val||null;
      msg(`"${val}" deleted. "${prev}" → ${nxt?'"'+nxt+'"':'null'}`,'ok');
      javaCode(`${cm('// Delete "'+val+'"')}\n${kw('TrainCar')} current = head;\n${kw('while')} (!current.${fn('getNext')}().cargo.${fn('equals')}(${st(val)})) {\n    current = current.${fn('getNext')}();\n}\n${cm('// skip over "'+val+'"')}\ncurrent.${fn('setNext')}(current.${fn('getNext')}().${fn('getNext')}());\n${cm('// "'+val+'" disconnected — removed!')}`);
    }
  },380);
}

function doSearch(){
  if(list.length===0){msg('Train is empty!','err');return;}
  const target=document.getElementById('srch-val').value.trim();
  if(!target){msg('Enter a cargo name to search','err');return;}
  clearSearch();
  let step=0;
  msg(`Scanning for "${target}"...`,'info');
  javaCode(`${cm('// Search for "'+target+'"')}\n${kw('TrainCar')} current = head;\n${kw('while')} (current != ${kw('null')}) {\n    ${kw('if')} (current.cargo.${fn('equals')}(${st(target)})) {\n        ${kw('return')} current;  ${cm('// FOUND!')}\n    }\n    current = current.${fn('getNext')}();\n}\n${kw('return')} ${kw('null')};  ${cm('// not found')}`);
  searchTimer=setInterval(()=>{
    if(step>=list.length){clearInterval(searchTimer);return;}
    if(list[step].val.toLowerCase()===target.toLowerCase()){
      render({found:list[step].id});
      msg(`Found "${list[step].val}" at index ${step} (position ${step+1})!`,'ok');
      ops++;document.getElementById('ops').textContent=ops;
      clearInterval(searchTimer);
    } else if(step===list.length-1){
      render();
      msg(`"${target}" not found — reached null at the end.`,'err');
      clearInterval(searchTimer);
    } else {
      render({highlight:list[step].id});
      msg(`Checking [${step}] "${list[step].val}" — not a match, moving on...`,'info');
    }
    step++;
  },700);
}

function clearSearch(){
  if(searchTimer) clearInterval(searchTimer);
  searchTimer=null;
  render();
}

function resetTrain(){
  clearSearch();
  list=[];ops=0;
  document.getElementById('ops').textContent='0';
  render();
  msg('Train reset. Add some cars!','');
  javaCode(`${cm('// Reset')}\nhead = ${kw('null')};`);
}
